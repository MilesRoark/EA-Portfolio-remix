    <main>
      <div class="description">
        <h1 class="title">Let’s work together</h1>
        <p class="summary">
          Interested in working together?<br />
          Fill out some info and I will be in touch shortly. <br />
          I can't wait to hear from you!
        </p>
      </div>
      <div class="content-wrapper">
        <img
          class="content-img"
          src="Assets/contact-background2.png"
          alt="a picture describing the objective with a cultural statue next to it."
        />
        <form action="" method="post">
          <label for="firstName"
            >First Name(required)<input
              type="text"
              id="firstName"
              name="first-name"
              required
          /></label>

          <label for="LastName"
            >Last Name(required)<input
              type="text"
              id="lastName"
              name="last-name"
              required
          /></label>

          <label for="email"
            >Email (required)
            <input type="email" id="email" name="email" required
          /></label>

          <label for="newsletter"
            ><input type="checkbox" />Sign up for news and updates</label
          >
          <label for="message"
            >Message (required)<textarea
              name="message"
              id="message"
              required
              rows="4"
              cols="30"
            ></textarea>
          </label>

          <button type="submit" class="submit-btn">Send</button>
        </form>
      </div>
